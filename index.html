<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Drilling Tycoon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Planet Drilling Tycoon</h1>
        <p>Welcome to Planet Drilling Tycoon! Start your mining adventure.</p>
        <div id="game">
            <button id="mineButton">Mine!</button>
            <div id="timer">10</div>
            <div id="upgrades">
                <h2>Upgrade Tree</h2>
                <ul>
                    <li><button class="upgrade" data-type="power">Increase Drilling Power</button></li>
                    <li><button class="upgrade" data-type="acceleration">Decrease Timer</button></li>
                    <li><button class="upgrade" data-type="capacity">Increase Battery Capacity</button></li>
                    <li><button class="upgrade" data-type="special">Unlock Special Tools</button></li>
                </ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
